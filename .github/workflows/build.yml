name: Build Image
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Get latest pocketbase tag
        id: get_tag
        run: |
          PB_TAG=$(curl -s https://api.github.com/repos/pocketbase/pocketbase/tags | jq -r '.[0].name')
          echo "PB_TAG=$PB_TAG" >> $GITHUB_ENV
      
      - name: Check if PB_TAG already exists in GHCR
        id: check_existing
        env:
          IMAGE: ghcr.io/gaz492/docker-pocketbase
        run: |
          if docker manifest inspect "$IMAGE:${PB_TAG}" > /dev/null 2>&1; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Image for ${PB_TAG} already exists. Skipping build."
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "No image for ${PB_TAG}. Building."
          fi
      
      - name: Set env
        if: steps.check_existing.outputs.should_build == 'true'
        run: echo "GITHUB_SHA_SHORT=$(echo $GITHUB_SHA | cut -c 1-6)" >> $GITHUB_ENV
      - name: Set TS env
        if: steps.check_existing.outputs.should_build == 'true'
        run: echo "TIMESTAMP=$(date +%s)" >> $GITHUB_ENV
      - name: Set Branch Env
        if: steps.check_existing.outputs.should_build == 'true'
        run: echo "BRANCH=$(echo ${GITHUB_REF#refs/heads/})" >> $GITHUB_ENV
      
      - name: Docker meta
        if: steps.check_existing.outputs.should_build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          # list of Docker images to use as base name for tags
          images: |
            ghcr.io/gaz492/docker-pocketbase
          # generate Docker tags based on the following events/attributes
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=${{env.PB_TAG}}
            type=raw,value=${{env.BRANCH}}-${{env.PB_TAG}}-${{env.TIMESTAMP}}
      
      - name: Set up QEMU
        if: steps.check_existing.outputs.should_build == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: steps.check_existing.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: steps.check_existing.outputs.should_build == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Test
        if: steps.check_existing.outputs.should_build == 'true'
        run: echo $GITHUB_SHA_SHORT

      - name: Build and push
        if: steps.check_existing.outputs.should_build == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            PB_VERSION=${{ env.PB_TAG }}